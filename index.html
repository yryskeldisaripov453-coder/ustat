<!DOCTYPE html>
<html lang="ky">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Билим Инновация — Студенттик Портал</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js"
      }
    }
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Inter:wght@400;500;700&display=swap');

        :root {
            --brand-indigo: #6366f1;
            --brand-dark: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #334155;
        }

        .brand-font {
            font-family: 'Montserrat', sans-serif;
        }

        .student-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background: white;
            border: 1px solid #e2e8f0;
        }

        .student-card:hover {
            transform: translateY(-2px);
            border-color: var(--brand-indigo);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .student-card.selected {
            border-color: var(--brand-indigo);
            background: #eef2ff;
            box-shadow: 0 0 0 2px var(--brand-indigo);
        }

        .gradient-bg {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }

        .chat-bubble {
            max-width: 85%;
            padding: 0.85rem;
            border-radius: 1rem;
            font-size: 0.875rem;
        }

        .loader {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .prose strong {
            color: #1e293b;
            font-weight: 700;
        }

        .prose ul {
            list-style-type: disc;
            margin-left: 1.5rem;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="gradient-bg p-2 rounded-lg text-white">
                    <i class="fas fa-university"></i>
                </div>
                <h1 class="text-xl font-black brand-font text-slate-900 tracking-tight">БИЛИМ <span
                        class="text-indigo-600">HUB</span></h1>
            </div>
            <div id="authStatus" class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full">
                Байланышуу...
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 w-full flex-grow grid lg:grid-cols-12 gap-6">

        <!-- Негизги бөлүк -->
        <div class="lg:col-span-8 space-y-6">
            <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-sm font-black uppercase tracking-widest text-slate-400 flex items-center gap-2">
                        <i class="fas fa-th-large"></i> Сабакты тандаңыз
                    </h2>
                </div>

                <div id="subjectGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-3 mb-8">
                    <!-- Сабактар скрипт аркылуу кошулат -->
                </div>

                <div class="space-y-3">
                    <label class="text-xs font-bold text-slate-500 ml-1">Үйрөнгүңүз келген теманы жазыңыз:</label>
                    <div class="relative flex flex-col sm:flex-row gap-2">
                        <input type="text" id="topicInput"
                            placeholder="Мисалы: Генетиканын негиздери же Пифагордун теоремасы..."
                            class="flex-grow px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 font-medium outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all">
                        <button id="generateBtn"
                            class="sm:w-40 h-14 gradient-bg text-white rounded-2xl font-bold flex items-center justify-center gap-2 hover:shadow-lg hover:shadow-indigo-200 active:scale-95 transition-all">
                            <span>Түшүндүр</span>
                            <div id="btnLoader" class="hidden loader"></div>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Маалымат көрсөтүлүүчү жер -->
            <div id="studyArea" class="hidden space-y-6">
                <div class="bg-white p-6 sm:p-10 rounded-[2.5rem] shadow-sm border border-slate-200">
                    <div class="flex flex-col md:flex-row justify-between items-start gap-6 mb-8">
                        <div class="flex-grow">
                            <div class="flex items-center gap-2 mb-2">
                                <span id="resSubject"
                                    class="px-3 py-1 bg-indigo-100 text-indigo-700 text-[10px] font-black rounded-full uppercase"></span>
                            </div>
                            <h2 id="resTitle" class="text-3xl md:text-4xl font-black text-slate-900 leading-tight"></h2>
                        </div>
                        <div id="videoBox"
                            class="w-full md:w-72 aspect-video bg-slate-900 rounded-3xl overflow-hidden shadow-2xl ring-8 ring-slate-50">
                            <iframe id="youtubeFrame" class="w-full h-full" src="" frameborder="0"
                                allowfullscreen></iframe>
                        </div>
                    </div>

                    <div id="resSummary"
                        class="prose prose-indigo max-w-none text-slate-600 leading-relaxed text-lg border-l-4 border-indigo-500 pl-6 mb-8">
                        <!-- Текст бул жерге келет -->
                    </div>

                    <div class="grid md:grid-cols-2 gap-6">
                        <div class="p-6 bg-slate-50 rounded-3xl border border-slate-100">
                            <h4 class="font-bold text-slate-900 mb-4 flex items-center gap-2">
                                <i class="fas fa-tags text-indigo-500"></i> Терминдер
                            </h4>
                            <div id="keyTerms" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div class="p-6 bg-amber-50 rounded-3xl border border-amber-100">
                            <h4 class="font-bold text-amber-900 mb-2 flex items-center gap-2">
                                <i class="fas fa-rocket text-amber-500"></i> Жөнөкөй тил менен
                            </h4>
                            <p id="simpleExplain" class="text-amber-800 text-sm italic leading-relaxed"></p>
                        </div>
                    </div>
                </div>

                <!-- Тест бөлүмү -->
                <div class="bg-slate-900 text-white p-8 rounded-[2.5rem] shadow-2xl">
                    <div class="flex items-center justify-between mb-6">
                        <h3 class="text-xl font-bold flex items-center gap-3">
                            <i class="fas fa-check-circle text-emerald-400"></i> Өзүңдү текшерип көр
                        </h3>
                    </div>
                    <div id="quizArea" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <!-- AI Чат бөлүгү -->
        <div class="lg:col-span-4">
            <div
                class="sticky top-24 flex flex-col h-[calc(100vh-120px)] bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
                <div class="p-4 border-b border-slate-100 flex items-center gap-3 bg-slate-50/50">
                    <div class="w-10 h-10 rounded-2xl gradient-bg flex items-center justify-center text-white">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div>
                        <p class="text-sm font-black text-slate-900">AI Насаатчы</p>
                        <p class="text-[10px] text-green-500 font-bold uppercase">Онлайн</p>
                    </div>
                </div>

                <div id="chatBox" class="flex-grow overflow-y-auto p-4 space-y-4">
                    <div class="chat-bubble bg-slate-100 text-slate-700">
                        Салам! Мен сенин жеке мугалимиңмин. Тема боюнча түшүнбөгөн нерселер болсо, тартынбай сура!
                    </div>
                </div>

                <div class="p-4 bg-white border-t border-slate-100">
                    <div class="relative">
                        <input type="text" id="chatInput" placeholder="Суроо жазуу..."
                            class="w-full pl-4 pr-12 py-3 rounded-xl bg-slate-100 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        <button onclick="window.sendChatMessage()"
                            class="absolute right-1 top-1 bottom-1 w-10 gradient-bg text-white rounded-lg flex items-center justify-center">
                            <i class="fas fa-paper-plane text-xs"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "firebase/auth";
        import { getFirestore } from "firebase/firestore";

        // Системалык конфигурация
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const apiKey = "AIzaSyDxFAT46GqkCyvre-bSXXbFd5qFC01heFs"; // Система тарабынан толтурулат

        let currentSubject = "Математика";

        const subjects = [
            { name: "Математика", icon: "fa-square-root-variable", color: "text-blue-600" },
            { name: "Физика", icon: "fa-atom", color: "text-orange-600" },
            { name: "Химия", icon: "fa-flask-vial", color: "text-red-600" },
            { name: "Биология", icon: "fa-leaf", color: "text-emerald-600" },
            { name: "Тарых", icon: "fa-monument", color: "text-amber-700" },
            { name: "География", icon: "fa-earth-africa", color: "text-cyan-600" },
            { name: "Информатика", icon: "fa-code", color: "text-slate-800" },
            { name: "Адабият", icon: "fa-feather-pointed", color: "text-purple-600" },
            { name: "Экономика", icon: "fa-coins", color: "text-yellow-600" },
            { name: "Астрономия", icon: "fa-user-astronaut", color: "text-blue-900" }
        ];

        // Предметтерди түзүү
        const initGrid = () => {
            const grid = document.getElementById('subjectGrid');
            grid.innerHTML = subjects.map(s => `
                <div onclick="window.selectSub('${s.name}')" id="sub-${s.name}" class="student-card p-3 rounded-2xl flex flex-col items-center cursor-pointer gap-2 text-center">
                    <div class="w-10 h-10 rounded-full bg-slate-50 flex items-center justify-center">
                        <i class="fas ${s.icon} text-lg ${s.color}"></i>
                    </div>
                    <span class="text-[9px] font-black uppercase text-slate-600 tracking-tighter">${s.name}</span>
                </div>
            `).join('');
            window.selectSub("Математика");
        };

        window.selectSub = (name) => {
            currentSubject = name;
            document.querySelectorAll('.student-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`sub-${name}`)?.classList.add('selected');
        };

        // Авторизация
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('authStatus').innerHTML = `<i class="fas fa-check-circle mr-1 text-green-500"></i> Онлайн`;
            } else {
                signInAnonymously(auth);
            }
        });

        // Gemini AI менен иштөө функциясы
        async function callGemini(prompt, systemPrompt = "") {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                } catch (e) {
                    await new Promise(res => setTimeout(res, 1000 * Math.pow(2, i)));
                }
            }
            return "Ката кетти, кайра аракет кылыңыз.";
        }

        // Материал генерациясы
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const topic = document.getElementById('topicInput').value.trim();
            if (!topic) return;

            const btn = document.getElementById('generateBtn');
            const loader = document.getElementById('btnLoader');
            btn.disabled = true;
            loader.classList.remove('hidden');

            const systemPrompt = `Сен кыргыз тилиндеги эксперт окутуучусуң. Жоопту ТАЗА JSON форматында гана бер:
            {
                "title": "Теманын аты",
                "summary": "Маалыматтык текст (HTML тегтер: <p>, <ul>, <li>, <strong>)",
                "simple": "Кичине балага түшүндүргөндөй",
                "terms": ["термин1", "термин2"],
                "youtube_query": "English query for education",
                "quiz": [{"q": "Суроо", "a": ["Туура", "Ката1", "Ката2", "Ката3"], "correct": 0}]
            }`;

            try {
                const result = await callGemini(`Тема: ${topic}. Сабак: ${currentSubject}. Кыргызча түшүндүрмө бер.`, systemPrompt);
                const data = JSON.parse(result.replace(/```json|```/g, ''));

                document.getElementById('studyArea').classList.remove('hidden');
                document.getElementById('resSubject').innerText = currentSubject;
                document.getElementById('resTitle').innerText = data.title;
                document.getElementById('resSummary').innerHTML = data.summary;
                document.getElementById('simpleExplain').innerText = data.simple;

                document.getElementById('keyTerms').innerHTML = data.terms.map(t => `
                    <span class="px-3 py-1 bg-white border border-slate-200 rounded-lg text-xs font-bold text-indigo-600"># ${t}</span>
                `).join('');

                document.getElementById('youtubeFrame').src = `https://www.youtube.com/embed?listType=search&list=${encodeURIComponent(data.youtube_query)}`;

                // Тест түзүү
                document.getElementById('quizArea').innerHTML = data.quiz.map((q, i) => `
                    <div class="p-6 bg-white/5 rounded-3xl border border-white/10">
                        <p class="font-bold mb-4">${i + 1}. ${q.q}</p>
                        <div class="grid sm:grid-cols-2 gap-3">
                            ${q.a.map((opt, j) => `
                                <button onclick="window.checkAns(this, ${j === q.correct})" class="text-left p-4 rounded-xl bg-white/10 hover:bg-white/20 transition-all text-sm">
                                    ${opt}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `).join('');

                window.scrollTo({ top: document.getElementById('studyArea').offsetTop - 80, behavior: 'smooth' });

            } catch (err) {
                console.error(err);
                alert("Маалымат алууда ката кетти.");
            } finally {
                btn.disabled = false;
                loader.classList.add('hidden');
            }
        });

        // Чат функциясы
        window.sendChatMessage = async () => {
            const input = document.getElementById('chatInput');
            const msg = input.value.trim();
            if (!msg) return;

            const chatBox = document.getElementById('chatBox');
            chatBox.innerHTML += `<div class="chat-bubble gradient-bg text-white ml-auto"> ${msg} </div>`;
            input.value = "";
            chatBox.scrollTop = chatBox.scrollHeight;

            const response = await callGemini(msg, "Сен кыргыз тилиндеги мугалимсиң. Жоопторду кыска бер.");
            chatBox.innerHTML += `<div class="chat-bubble bg-slate-100 text-slate-800"> ${response} </div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        };

        // Тестти текшерүү
        window.checkAns = (btn, isCorrect) => {
            const container = btn.closest('.grid');
            btn.classList.add(isCorrect ? 'bg-emerald-500' : 'bg-red-500', 'text-white');
            container.querySelectorAll('button').forEach(b => b.disabled = true);
        };

        initGrid();
    </script>
</body>


</html>
